<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline Appointments - Okafor Memorial Hospital</title>
    <link rel="stylesheet" href="/lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/site.css" />
</head>
<body class="bg-light">
    <main class="container py-4 py-md-5">
        <div class="mx-auto" style="max-width: 760px;">
            <p class="text-uppercase fw-semibold text-success mb-2" style="font-size:0.7rem; letter-spacing:0.16em;">Okafor Memorial Hospital</p>
            <h1 class="h3 mb-3">Offline appointments</h1>
            <p class="text-muted">
                This page shows the appointment summary you chose to save on this device. Private portal records, documents, billing, lab results, and messages are not stored offline.
            </p>

            <div class="alert alert-warning small d-none" data-offline-appointments-empty aria-live="polite" role="status">
                No appointment summary is saved on this device yet.
            </div>

            <div class="vstack gap-3 mt-4" data-offline-appointments-list aria-live="polite" aria-label="Appointment list"></div>

            <div class="d-flex flex-wrap gap-2 mt-4">
                <a href="/Portal/Appointments" class="btn btn-success">Open portal</a>
                <a href="/" class="btn btn-outline-secondary">Home</a>
            </div>
        </div>
    </main>
    <script src="/js/pwa-appointments.js"></script>
</body>
</html>
