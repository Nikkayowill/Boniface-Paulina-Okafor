name: CI

on:
  push:
    branches:
      - main
      - master
      - launch/july31
  pull_request:

jobs:
  linux-build-test-smoke:
    runs-on: ubuntu-latest
    env:
      ASPNETCORE_ENVIRONMENT: Testing
      ASPNETCORE_URLS: http://localhost:5187
      OKAFOR_BASE_URL: http://localhost:5187

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Okafor-.NET.sln

      - name: Build
        run: dotnet build tests/Okafor.NET.Tests/Okafor.NET.Tests.csproj --no-restore

      - name: Test non-smoke suite
        run: >-
          dotnet test tests/Okafor.NET.Tests/Okafor.NET.Tests.csproj
          --no-build
          --filter "Category!=Smoke&Category!=DatabaseIntegration"
          --logger "trx;LogFileName=non-smoke.trx"
          --results-directory artifacts/test-results/non-smoke

      - name: Start app for smoke tests
        run: |
          nohup dotnet run --project Okafor-.NET.csproj --no-build --no-launch-profile > okafor-app.log 2>&1 &
          echo $! > okafor-app.pid
          for i in {1..30}; do
            if curl --fail --silent http://localhost:5187/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat okafor-app.log
          exit 1

      - name: Test smoke suite
        run: >-
          dotnet test tests/Okafor.NET.Tests/Okafor.NET.Tests.csproj
          --no-build
          --filter "Category=Smoke"
          --logger "trx;LogFileName=smoke.trx"
          --results-directory artifacts/test-results/smoke

      - name: Vulnerability scan
        run: dotnet list package --vulnerable --include-transitive

      - name: Upload Linux failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-test-and-smoke-failure
          path: |
            okafor-app.log
            artifacts/test-results
          if-no-files-found: ignore
          retention-days: 7

  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Okafor-.NET.sln

      - name: Build
        run: dotnet build tests/Okafor.NET.Tests/Okafor.NET.Tests.csproj --no-restore

      - name: Test non-smoke suite
        run: >-
          dotnet test tests/Okafor.NET.Tests/Okafor.NET.Tests.csproj
          --no-build
          --filter "Category!=Smoke&Category!=DatabaseIntegration"
          --logger "trx;LogFileName=windows-non-smoke.trx"
          --results-directory artifacts/test-results/windows

      - name: Upload Windows failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-failure
          path: artifacts/test-results/windows
          if-no-files-found: ignore
          retention-days: 7

  sqlserver-database-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run SQL Server container integration tests
        run: ./scripts/verify-database-integration.sh

  chromium-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore E2E project
        run: dotnet restore tests/Okafor.NET.E2E/Okafor.NET.E2E.csproj

      - name: Build E2E project
        run: dotnet build tests/Okafor.NET.E2E/Okafor.NET.E2E.csproj --no-restore

      - name: Install Playwright Chromium
        run: pwsh tests/Okafor.NET.E2E/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run SQL Server browser journeys
        env:
          E2E_ARTIFACTS_PATH: artifacts/e2e
        run: dotnet test tests/Okafor.NET.E2E/Okafor.NET.E2E.csproj --no-build --filter "Category=E2E"

      - name: Upload E2E failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-evidence
          path: artifacts/e2e
          if-no-files-found: ignore
          retention-days: 7
