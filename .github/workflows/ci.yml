name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  linux-build-test-smoke:
    runs-on: ubuntu-latest
    env:
      ASPNETCORE_ENVIRONMENT: Testing
      ASPNETCORE_URLS: http://localhost:5187
      OKAFOR_BASE_URL: http://localhost:5187

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Okafor-.NET.sln

      - name: Build
        run: dotnet build tests/Okafor.NET.Tests/Okafor.NET.Tests.csproj --no-restore

      - name: Test non-smoke suite
        run: dotnet test tests/Okafor.NET.Tests/Okafor.NET.Tests.csproj --no-build --filter "Category!=Smoke&Category!=DatabaseIntegration"

      - name: Start app for smoke tests
        run: |
          nohup dotnet run --project Okafor-.NET.csproj --no-build --no-launch-profile > okafor-app.log 2>&1 &
          echo $! > okafor-app.pid
          for i in {1..30}; do
            if curl --fail --silent http://localhost:5187/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat okafor-app.log
          exit 1

      - name: Test smoke suite
        run: dotnet test tests/Okafor.NET.Tests/Okafor.NET.Tests.csproj --no-build --filter "Category=Smoke"

      - name: Vulnerability scan
        run: dotnet list package --vulnerable --include-transitive

  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Okafor-.NET.sln

      - name: Build
        run: dotnet build tests/Okafor.NET.Tests/Okafor.NET.Tests.csproj --no-restore

      - name: Test non-smoke suite
        run: dotnet test tests/Okafor.NET.Tests/Okafor.NET.Tests.csproj --no-build --filter "Category!=Smoke&Category!=DatabaseIntegration"

  sqlserver-database-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run SQL Server container integration tests
        run: ./scripts/verify-database-integration.sh
