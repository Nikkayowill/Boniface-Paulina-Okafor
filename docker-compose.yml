services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: okafor-mssql
    env_file: .env
    environment:
      - ACCEPT_EULA=Y
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-C", "-Q", "select 1"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  mssql-data:
